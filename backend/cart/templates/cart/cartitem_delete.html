{% extends 'base/base.html' %}
{% block title %} - Supprimer du panier{% endblock %}

{% block content %}
<div class="col-md-6 mx-auto mt-5">
    <div class="card shadow-sm text-center">
        <div class="card-body py-5">
            <i class="fas fa-trash fa-3x text-danger mb-3"></i>
            <h4>Confirmer la suppression</h4>
            <p class="text-muted">
                Voulez-vous retirer <strong>{{ object.product.name }}</strong> de votre panier ?
            </p>
            <form method="post">
                {% csrf_token %}
                <button type="submit" class="btn btn-danger me-2">
                    <i class="fas fa-check me-1"></i>Oui, supprimer
                </button>
                <a href="{% url 'cart_detail' %}" class="btn btn-outline-secondary">Annuler</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
